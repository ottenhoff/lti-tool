name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Smoke test dist imports
        run: npm run smoke-test:dist

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:coverage

  integration-core:
    name: Integration (core)
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run core integration tests
        run: npm run test:integration:core

  integration-mysql:
    name: Integration (mysql)
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 15
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: lti_test
          MYSQL_USER: lti_user
          MYSQL_PASSWORD: lti_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Apply MySQL schema
        env:
          DATABASE_URL: mysql://lti_user:lti_password@127.0.0.1:3306/lti_test
        run: npm run db:migrate:mysql

      - name: Run MySQL integration tests
        env:
          DATABASE_URL: mysql://lti_user:lti_password@127.0.0.1:3306/lti_test
        run: npm run test:integration:mysql

  integration-postgresql:
    name: Integration (postgresql)
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 15
    services:
      postgresql:
        image: postgres:16
        env:
          POSTGRES_USER: lti_user
          POSTGRES_PASSWORD: lti_password
          POSTGRES_DB: lti_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -h 127.0.0.1 -U lti_user -d lti_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Apply PostgreSQL schema
        env:
          DATABASE_URL: postgresql://lti_user:lti_password@127.0.0.1:5432/lti_test
        run: npm run db:migrate:postgresql

      - name: Run PostgreSQL integration tests
        env:
          DATABASE_URL: postgresql://lti_user:lti_password@127.0.0.1:5432/lti_test
        run: npm run test:integration:postgresql

  integration-d1:
    name: Integration (d1)
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run D1 integration tests
        run: npm run test:integration:d1
